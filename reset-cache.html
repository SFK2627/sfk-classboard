<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SFK Cache Reset</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:22px;font-family:Arial,sans-serif;background:#fff8dc;color:#111}.card{width:min(92vw,500px);padding:24px;border:2px solid #f7c600;border-radius:22px;background:#fff;box-shadow:0 14px 40px rgba(0,0,0,.12);text-align:center}.links{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:18px}a{display:inline-flex;align-items:center;justify-content:center;min-height:46px;padding:0 16px;border-radius:12px;border:2px solid #111;background:#f7c600;color:#111;font-weight:800;text-decoration:none}#status{font-weight:800;color:#6b5200;line-height:1.5}
  </style>
</head>
<body>
  <div class="card">
    <h1>SFK Cache Reset</h1>
    <p id="status">Clearing old app cache...</p>
    <p>Use this once after uploading the repair files.</p>
    <div class="links">
      <a href="admin.html?fresh=route-clean-v9">Open Admin</a>
      <a href="officer.html?fresh=route-clean-v9">Open Officers</a>
      <a href="index.html?fresh=route-clean-v9">Open ClassBoard</a>
    </div>
  </div>
  <script>
    (function(){
      var statusEl=document.getElementById('status');
      var params=new URLSearchParams(location.search);
      var go=(params.get('go')||'').toLowerCase();
      var target=go==='officers'?'officer.html?fresh=route-clean-v9':go==='home'?'index.html?fresh=route-clean-v9':'admin.html?fresh=route-clean-v9';
      function unregister(){return !('serviceWorker'in navigator)?Promise.resolve():navigator.serviceWorker.getRegistrations().then(function(regs){return Promise.all(regs.map(function(r){return r.unregister();}));});}
      function clearCaches(){return !('caches'in window)?Promise.resolve():caches.keys().then(function(keys){return Promise.all(keys.map(function(k){return caches.delete(k);}));});}
      Promise.all([unregister(),clearCaches()]).then(function(){statusEl.textContent='Done. Redirecting...';setTimeout(function(){location.replace(target);},700);}).catch(function(){statusEl.textContent='Cache reset attempted. Use the buttons below.';});
    }());
  </script>
</body>
</html>
