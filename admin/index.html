<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f7c600" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="SFK Admin" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>SFK Admin</title>
  <link rel="manifest" href="manifest.webmanifest?v=nav-route-safe-v91" />
  <link rel="icon" type="image/png" sizes="192x192" href="../icons/icon-192.png?v=3" />
  <link rel="apple-touch-icon" href="../icons/icon-192.png?v=3" />
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff8dc;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100dvh;
      border: 0;
      background: #fff8dc;
    }
  </style>
  <script src="../orientation-lock.js?v=appwide-v6" defer></script>
</head>
<body>
  <iframe src="../admin.html?embedded=1&v=appwide-portrait-v6" title="SFK ClassBoard Admin"></iframe>
  <script>
    (function () {
      var reloadKey = "sfkAdminControllerReloadV91";

      function reloadOnce() {
        try {
          if (sessionStorage.getItem(reloadKey) === "1") return;
          sessionStorage.setItem(reloadKey, "1");
          window.location.reload();
        } catch (error) {
          window.location.reload();
        }
      }

      function activateWaitingWorker(worker) {
        if (!worker) return;
        try {
          worker.postMessage({ type: "SFK_SKIP_WAITING_NAV_ROUTE_SAFE_V91" });
        } catch (error) {}
      }

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.addEventListener("controllerchange", reloadOnce);

        window.addEventListener("load", function () {
          navigator.serviceWorker.register("./sw.js?v=nav-route-safe-v91", {
            scope: "./",
            updateViaCache: "none"
          }).then(function (registration) {
            registration.update().catch(function () {});
            activateWaitingWorker(registration.waiting);
            registration.addEventListener("updatefound", function () {
              var worker = registration.installing;
              if (!worker) return;
              worker.addEventListener("statechange", function () {
                if (worker.state === "installed" && navigator.serviceWorker.controller) {
                  activateWaitingWorker(worker);
                }
              });
            });
          }).catch(function (error) {
            console.warn("Admin service worker registration failed:", error);
          });
        });
      }
    })();
  </script>
</body>
</html>
